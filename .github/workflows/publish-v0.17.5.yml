name: Publish v0.17.5 Release

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/publish-v0.17.5.yml"
      - ".github/release-v0.17.5.md"

permissions:
  contents: write

jobs:
  publish:
    name: Publish v0.17.5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: v0.17.5
        shell: bash
        run: |
          set -euo pipefail
          release_id="$(
            gh api "repos/${REPO}/releases" --paginate \
              --jq ".[] | select(.tag_name == \"${TAG}\") | .id" \
              | head -n 1
          )"
          test -n "${release_id}"
          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "name": "v0.17.5",
              "body": Path(".github/release-v0.17.5.md").read_text(encoding="utf-8"),
              "draft": False,
              "prerelease": False,
          }
          Path("release-payload.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8",
          )
          PY
          curl --fail-with-body --silent --show-error \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/releases/${release_id}" \
            --data-binary @release-payload.json
