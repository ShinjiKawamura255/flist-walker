name: Publish v0.17.5 Release

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/publish-v0.17.5.yml"

permissions:
  contents: write

jobs:
  publish:
    name: Publish v0.17.5
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: v0.17.5
        shell: bash
        run: |
          set -euo pipefail
          cat > release-body.md <<'BODY'
          ## Summary
          - Release: `v0.17.5`
          - Date: `2026-05-14`
          - This patch release restores the GUI path-copy shortcut and hardens macOS release asset builds against hosted runner Cargo PATH/cache differences.
          - Windows asset は `x86_64-pc-windows-gnu` + mingw-w64 により Linux/WSL 系導線から生成する。
          - standalone バイナリ配布に対応するため、各 OS 向け `README` / `LICENSE` / `THIRD_PARTY_NOTICES` sidecar asset も同時に添付する。

          ## Downloads
          - macOS の `.app` bundle 自体は notarization 用の中間成果物であり、GitHub Release の添付対象には含めない。
          - `FlistWalker-0.17.5-linux-x86_64`
          - `FlistWalker-0.17.5-linux-x86_64.tar.gz`
          - `FlistWalker-0.17.5-linux-x86_64.README.txt`
          - `FlistWalker-0.17.5-linux-x86_64.LICENSE.txt`
          - `FlistWalker-0.17.5-linux-x86_64.THIRD_PARTY_NOTICES.txt`
          - `FlistWalker-0.17.5-windows-x86_64.exe`
          - `FlistWalker-0.17.5-windows-x86_64.zip`
          - `FlistWalker-0.17.5-windows-x86_64.README.txt`
          - `FlistWalker-0.17.5-windows-x86_64.LICENSE.txt`
          - `FlistWalker-0.17.5-windows-x86_64.THIRD_PARTY_NOTICES.txt`
          - `FlistWalker-0.17.5-macos-x86_64`
          - `FlistWalker-0.17.5-macos-x86_64-app.zip`
          - `FlistWalker-0.17.5-macos-x86_64.tar.gz`
          - `FlistWalker-0.17.5-macos-x86_64.README.txt`
          - `FlistWalker-0.17.5-macos-x86_64.LICENSE.txt`
          - `FlistWalker-0.17.5-macos-x86_64.THIRD_PARTY_NOTICES.txt`
          - `FlistWalker-0.17.5-macos-arm64`
          - `FlistWalker-0.17.5-macos-arm64-app.zip`
          - `FlistWalker-0.17.5-macos-arm64.tar.gz`
          - `FlistWalker-0.17.5-macos-arm64.README.txt`
          - `FlistWalker-0.17.5-macos-arm64.LICENSE.txt`
          - `FlistWalker-0.17.5-macos-arm64.THIRD_PARTY_NOTICES.txt`
          - `SHA256SUMS`
          - `SHA256SUMS.sig`

          ## Added
          -

          ## Changed
          - macOS release build script と release workflow cache を調整し、GitHub-hosted macOS runner の Cargo shim / PATH 差異で release asset build が失敗しないようにした。

          ## Fixed
          - Fixed `Ctrl+Shift+C` on Windows/Linux and `Cmd+Shift+C` on macOS so the GUI copies the selected or pinned path(s) even when the backend reports the chord as a clipboard copy event while the search box is focused.

          ## Breaking
          -

          ## Deprecated
          -

          ## Security
          - query history は既定で平文永続化される。必要なら `FLISTWALKER_DISABLE_HISTORY_PERSIST=1` を案内する。
          - 自動更新の対象ビルドは埋め込み公開鍵で `SHA256SUMS.sig` を検証し、その後 `SHA256SUMS` の checksum を照合する。

          ## Known issues
          - notarization 環境が整うまで、macOS 配布物は未 notarized の場合がある。

          ## Verify checksum
          PowerShell:
          ```powershell
          Get-FileHash -Algorithm SHA256 .\FlistWalker-0.17.5-windows-x86_64.exe
          Get-FileHash -Algorithm SHA256 .\FlistWalker-0.17.5-windows-x86_64.zip
          ```

          bash:
          ```bash
          sha256sum -c SHA256SUMS
          ```
          BODY
          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "name": "v0.17.5",
              "body": Path("release-body.md").read_text(encoding="utf-8"),
              "draft": False,
              "prerelease": False,
          }
          Path("release-payload.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8",
          )
          PY
          release_id="$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.id')"
          gh api -X PATCH "repos/${REPO}/releases/${release_id}" --input release-payload.json >/dev/null
