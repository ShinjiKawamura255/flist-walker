name: Release Tagged Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-release-assets:
    name: Build Release Assets (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x86_64
            artifact_name: release-windows-x86_64
          - os: ubuntu-latest
            label: linux-x86_64
            artifact_name: release-linux-x86_64
          - os: macos-15-intel
            label: macos-x86_64
            artifact_name: release-macos-x86_64
            target: x86_64-apple-darwin
          - os: macos-14
            label: macos-arm64
            artifact_name: release-macos-arm64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        if: ${{ !matrix.target }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust with target
        if: ${{ matrix.target }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/build-rust-win.ps1

      - name: Package Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/prepare-release.ps1 -Version "${{ github.ref_name }}"

      - name: Build Linux release
        if: runner.os == 'Linux'
        shell: bash
        working-directory: rust
        run: cargo build --release --locked

      - name: Package Linux release assets
        if: runner.os == 'Linux'
        shell: bash
        run: ./scripts/prepare-release-linux.sh "${{ github.ref_name }}"

      - name: Build macOS release
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/build-rust-macos.sh "${{ matrix.target }}"

      - name: Package macOS release assets
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/prepare-release-macos.sh "${{ github.ref_name }}" "${{ matrix.target }}"

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ github.ref_name }}/*
          if-no-files-found: error

  create-draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: build-release-assets
    permissions:
      contents: write

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets

      - name: Show downloaded assets
        shell: bash
        run: find release-assets -maxdepth 3 -type f | sort

      - name: Collect release bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-bundle
          find release-assets -type f ! -name 'SHA256SUMS' -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-bundle/$(basename "$file")"
          done
          (
            cd release-bundle
            sha256sum * > SHA256SUMS
          )
          ls -la release-bundle

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: release-bundle/*
          fail_on_unmatched_files: true
          overwrite_files: true
