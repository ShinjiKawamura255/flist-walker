name: Release Tagged Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-preflight:
    name: Release Preflight (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-native
            workdir: rust
          - os: macos-latest
            label: macos-native
            workdir: rust
          - os: windows-latest
            label: windows-native
            workdir: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run tests
        working-directory: ${{ matrix.workdir }}
        run: cargo test --locked

      - name: Run clippy
        if: ${{ matrix.label == 'linux-native' }}
        working-directory: ${{ matrix.workdir }}
        run: cargo clippy --all-targets -- -D warnings

  release-cargo-audit:
    name: Release Cargo Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  build-release-assets:
    name: Build Release Assets (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs:
      - release-preflight
      - release-cargo-audit
    env:
      FLISTWALKER_UPDATE_PUBLIC_KEY_HEX: ${{ secrets.FLISTWALKER_UPDATE_PUBLIC_KEY_HEX }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: windows-x86_64
            artifact_name: release-windows-x86_64
            target: x86_64-pc-windows-gnu
            upload_paths: |
              dist/${{ github.ref_name }}/FlistWalker-*-windows-x86_64.exe
              dist/${{ github.ref_name }}/FlistWalker-*-windows-x86_64.zip
              dist/${{ github.ref_name }}/FlistWalker-*-windows-x86_64.README.txt
              dist/${{ github.ref_name }}/FlistWalker-*-windows-x86_64.LICENSE.txt
              dist/${{ github.ref_name }}/FlistWalker-*-windows-x86_64.THIRD_PARTY_NOTICES.txt
              dist/${{ github.ref_name }}/SHA256SUMS
          - os: ubuntu-latest
            label: linux-x86_64
            artifact_name: release-linux-x86_64
            upload_paths: |
              dist/${{ github.ref_name }}/FlistWalker-*-linux-x86_64
              dist/${{ github.ref_name }}/FlistWalker-*-linux-x86_64.tar.gz
              dist/${{ github.ref_name }}/FlistWalker-*-linux-x86_64.README.txt
              dist/${{ github.ref_name }}/FlistWalker-*-linux-x86_64.LICENSE.txt
              dist/${{ github.ref_name }}/FlistWalker-*-linux-x86_64.THIRD_PARTY_NOTICES.txt
              dist/${{ github.ref_name }}/SHA256SUMS
          - os: macos-15-intel
            label: macos-x86_64
            artifact_name: release-macos-x86_64
            target: x86_64-apple-darwin
            upload_paths: |
              dist/${{ github.ref_name }}/FlistWalker-*-macos-x86_64
              dist/${{ github.ref_name }}/FlistWalker-*-macos-x86_64-app.zip
              dist/${{ github.ref_name }}/FlistWalker-*-macos-x86_64.tar.gz
              dist/${{ github.ref_name }}/FlistWalker-*-macos-x86_64.README.txt
              dist/${{ github.ref_name }}/FlistWalker-*-macos-x86_64.LICENSE.txt
              dist/${{ github.ref_name }}/FlistWalker-*-macos-x86_64.THIRD_PARTY_NOTICES.txt
              dist/${{ github.ref_name }}/SHA256SUMS
          - os: macos-14
            label: macos-arm64
            artifact_name: release-macos-arm64
            target: aarch64-apple-darwin
            upload_paths: |
              dist/${{ github.ref_name }}/FlistWalker-*-macos-arm64
              dist/${{ github.ref_name }}/FlistWalker-*-macos-arm64-app.zip
              dist/${{ github.ref_name }}/FlistWalker-*-macos-arm64.tar.gz
              dist/${{ github.ref_name }}/FlistWalker-*-macos-arm64.README.txt
              dist/${{ github.ref_name }}/FlistWalker-*-macos-arm64.LICENSE.txt
              dist/${{ github.ref_name }}/FlistWalker-*-macos-arm64.THIRD_PARTY_NOTICES.txt
              dist/${{ github.ref_name }}/SHA256SUMS

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        if: ${{ !matrix.target }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust with target
        if: ${{ matrix.target }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install mingw-w64
        if: ${{ matrix.label == 'windows-x86_64' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 binutils-mingw-w64-x86-64

      - name: Build Windows release
        if: ${{ matrix.label == 'windows-x86_64' }}
        shell: bash
        run: ./scripts/build-rust-win.sh --locked

      - name: Package Windows release assets
        if: ${{ matrix.label == 'windows-x86_64' }}
        shell: bash
        run: ./scripts/prepare-release.sh "${{ github.ref_name }}"

      - name: Build Linux release
        if: ${{ matrix.label == 'linux-x86_64' }}
        shell: bash
        working-directory: rust
        run: cargo build --release --locked

      - name: Package Linux release assets
        if: ${{ matrix.label == 'linux-x86_64' }}
        shell: bash
        run: ./scripts/prepare-release-linux.sh "${{ github.ref_name }}"

      - name: Build macOS release
        if: ${{ matrix.label == 'macos-x86_64' || matrix.label == 'macos-arm64' }}
        shell: bash
        run: ./scripts/build-rust-macos.sh "${{ matrix.target }}"

      - name: Package macOS release assets
        if: ${{ matrix.label == 'macos-x86_64' || matrix.label == 'macos-arm64' }}
        shell: bash
        run: ./scripts/prepare-release-macos.sh "${{ github.ref_name }}" "${{ matrix.target }}"

      - name: Upload packaged assets
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.upload_paths }}
          if-no-files-found: error

  create-draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: build-release-assets
    env:
      FLISTWALKER_UPDATE_SIGNING_KEY_HEX: ${{ secrets.FLISTWALKER_UPDATE_SIGNING_KEY_HEX }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate signing key
        shell: bash
        run: |
          set -euo pipefail
          test -n "${FLISTWALKER_UPDATE_SIGNING_KEY_HEX}"

      - name: Download packaged assets
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release-assets

      - name: Show downloaded assets
        shell: bash
        run: find release-assets -maxdepth 3 -type f | sort

      - name: Collect release bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-bundle
          find release-assets -type f -name 'FlistWalker-*' -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-bundle/$(basename "$file")"
          done
          (
            cd release-bundle
            sha256sum * > SHA256SUMS
          )
          ls -la release-bundle

      - name: Sign release checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          cargo run --manifest-path rust/Cargo.toml --quiet --bin sign_update_manifest -- \
            release-bundle/SHA256SUMS release-bundle/SHA256SUMS.sig

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          assets=(release-bundle/*)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "release-bundle is empty" >&2
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --draft
          else
            gh release create "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --verify-tag \
              --draft \
              --generate-notes
          fi
