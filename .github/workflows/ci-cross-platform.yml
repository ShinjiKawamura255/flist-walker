name: CI Cross Platform

on:
  push:
    branches:
      - master
      - "codex/**"
  pull_request:

jobs:
  rust-test-build:
    name: Rust Test and Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-native
            workdir: rust
            shell: bash
            run_tests: true
            build_cmd: cargo build --release --locked
          - os: macos-latest
            label: macos-native
            workdir: rust
            shell: bash
            run_tests: true
            build_cmd: cargo build --release --locked
          - os: windows-latest
            label: windows-native
            workdir: rust
            shell: pwsh
            run_tests: true
            build_cmd: cargo build --release --locked
          - os: ubuntu-latest
            label: windows-gnu-cross
            workdir: .
            target: x86_64-pc-windows-gnu
            shell: bash
            run_tests: false
            build_cmd: ./scripts/build-rust-win.sh --locked

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        if: ${{ !matrix.target }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust with target
        if: ${{ matrix.target }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install mingw-w64
        if: ${{ matrix.target }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 binutils-mingw-w64-x86-64

      - name: Run tests
        if: ${{ matrix.run_tests }}
        shell: ${{ matrix.shell }}
        working-directory: ${{ matrix.workdir }}
        run: cargo test --locked

      - name: Build release
        shell: ${{ matrix.shell }}
        working-directory: ${{ matrix.workdir }}
        run: ${{ matrix.build_cmd }}

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
