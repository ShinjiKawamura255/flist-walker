name: CI Cross Platform

on:
  push:
    branches:
      - master
      - "codex/**"
  pull_request:

jobs:
  rust-test-build:
    name: Rust Test and Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    defaults:
      run:
        shell: bash
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run tests
        run: cargo test --locked

      - name: Build release
        run: cargo build --release --locked

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
